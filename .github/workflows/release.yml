name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  validate-release-tag:
    name: Validate release tag
    runs-on: ubuntu-latest

    steps:
      - name: Validate release tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match vX.X.X"
            exit 1
          fi

  build-release:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: validate-release-tag
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            output: chronicle-linux-amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            output: chronicle-linux-arm64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            output: chronicle-darwin-amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            output: chronicle-darwin-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w" \
            -o "dist/${{ matrix.output }}" \
            ./cmd/chronicle

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  upload-release:
    name: Upload release binaries
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
